plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ggeeli.workoutnative'
    compileSdk 35

    defaultConfig {
        applicationId 'com.ggeeli.workoutnative'
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }
}

if (!tasks.names.contains('prepareKotlinBuildScriptModel')) {
    tasks.register('prepareKotlinBuildScriptModel') {
        group = 'build setup'
        description = 'Compatibility task for Android Studio model sync in this Java-only project.'
    }
}